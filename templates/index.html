<!doctype html>
<html>

<head>

<meta charset="utf-8">
<title>Pentest</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:linear-gradient(120deg,#1e3c72,#2a5298);
color:#333;
}

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
margin-top:0;
color:#2a5298;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 16px;
border:none;
border-radius:5px;
margin-top:15px;
cursor:pointer;
}

#runBtn{
background:#2a5298;
color:white;
}

#downloadBtn{
background:#555;
color:white;
}

pre{
background:#111;
color:#00ff90;
padding:15px;
border-radius:6px;
overflow:auto;
max-height:350px;
}

</style>

</head>

<body>

<div class="container">

<h1>Pentest</h1>

<label>Target URL</label>
<input id="url" type="text" placeholder="Enter target URL">

<label>Packages</label>
<input id="packages" type="text" placeholder="express,mysql,openssl">

<button id="runBtn">Run Scan</button>

<button id="downloadBtn" disabled>Download Report</button>

<pre id="output">No results yet</pre>

</div>

<script>

document.getElementById('runBtn').addEventListener('click', runScan);

document.getElementById('downloadBtn').addEventListener('click', () => {
window.open('/download-report','_blank');
});

async function runScan(){

const url=document.getElementById('url').value.trim();

const packages=document.getElementById('packages').value
.split(',')
.map(p=>p.trim())
.filter(Boolean);

document.getElementById("output").textContent="Sending permission request to target...";

const response=await fetch('/scan',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
url:url,
packages:packages
})
});

const data=await response.json();

if(data.status==="pending"){
document.getElementById("output").textContent=
"Permission request sent to target.\nWaiting for owner approval...";
}
else{
document.getElementById("output").textContent=JSON.stringify(data,null,2);
}

if(data.report_path){
document.getElementById("downloadBtn").disabled=false;
}

}

</script>

</body>
</html>
